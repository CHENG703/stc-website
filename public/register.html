<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - STC网站</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <a href="/">STC网站</a>
            </div>
            <ul class="nav-menu">
                <li><a href="/">首页</a></li>
                <li><a href="/login">登录</a></li>
                <li><a href="/register" class="active">注册</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="auth-container">
                <div class="auth-form">
                    <h2>注册</h2>
                    <form id="register-form" onsubmit="handleRegister(event)">
                        <div class="form-group">
                            <label for="username">用户名</label>
                            <input type="text" id="username" name="username" required>
                        </div>
                        <div class="form-group">
                            <label for="email">QQ邮箱</label>
                            <input type="email" id="email" name="email" required placeholder="example@qq.com">
                        </div>
                        <div class="form-group">
                            <label for="invite-code">邀请码</label>
                            <input type="text" id="invite-code" name="invite-code" required>
                        </div>
                        <div class="form-group">
                            <label for="password">密码</label>
                            <input type="password" id="password" name="password" required placeholder="至少6位">
                        </div>
                        <div class="form-group">
                            <label for="confirm-password">确认密码</label>
                            <input type="password" id="confirm-password" name="confirm-password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">注册</button>
                    </form>
                    <p class="auth-footer">
                        已有账号？<a href="/login">立即登录</a>
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/register.js"></script>
</body>
</html>
